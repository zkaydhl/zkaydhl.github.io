<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 必备标签 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#b87eb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f33f.png">
    
    <title>清禾后花园</title>
    <!-- 引入 FontAwesome 图标库与 CryptoJS 加密库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* --- 动态月相与时间环境光 CSS 变量系统 --- */
        :root {
            --bg-base: #fbf6fa;
            --bg-gradient-1: rgba(216, 180, 248, 0.85); 
            --bg-gradient-2: rgba(255, 204, 225, 0.85);   
            --bg-gradient-3: rgba(238, 224, 255, 0.7);  
            --bg-gradient-4: rgba(255, 218, 233, 0.7);    
            
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.15) 100%);
            --glass-border: rgba(255, 255, 255, 0.65);
            --glass-shadow: 0 8px 32px rgba(189, 131, 184, 0.08), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            
            --text-main: #5c4366; 
            --text-muted: rgba(92, 67, 102, 0.65);
            --btn-glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.1) 100%);
            --btn-hover-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.3) 100%);
            --accent-color: #b87eb5; 
            --art-text-gradient: linear-gradient(135deg, #8a57ba 0%, #e487a6 100%);
            --moon-lum: 1; /* 月相亮度系数 */
        }

        /* 繁星暗黑主题 (18:00 - 次日 6:00) */
        body.theme-night {
            --bg-base: #0f0a14;
            --bg-gradient-1: rgba(60, 35, 90, calc(0.85 * var(--moon-lum))); 
            --bg-gradient-2: rgba(85, 45, 85, calc(0.85 * var(--moon-lum)));   
            --bg-gradient-3: rgba(30, 15, 50, calc(0.7 * var(--moon-lum)));  
            --bg-gradient-4: rgba(45, 20, 55, calc(0.7 * var(--moon-lum)));    
            
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.05);
            
            --text-main: #dfcce8; 
            --text-muted: rgba(223, 204, 232, 0.5);
            --btn-glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            --btn-hover-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            --accent-color: #c99bc6; 
            --art-text-gradient: linear-gradient(135deg, #a37bc7 0%, #d69db3 100%);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Noto Serif SC", "STKaiti", "KaiTi", serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-base);
            background-image: 
                radial-gradient(at 20% 20%, var(--bg-gradient-1) 0px, transparent 55%),
                radial-gradient(at 80% 20%, var(--bg-gradient-2) 0px, transparent 55%),
                radial-gradient(at 80% 80%, var(--bg-gradient-3) 0px, transparent 55%),
                radial-gradient(at 20% 80%, var(--bg-gradient-4) 0px, transparent 55%);
            background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            padding: 30px 20px; color: var(--text-main);
            user-select: none; -webkit-user-select: none;
            transition: background-color 3s ease, color 2s ease; 
            perspective: 1200px; overflow: hidden;
            animation: breath 8s infinite ease-in-out; /* 【同频共振】呼吸流光 */
        }

        @keyframes breath {
            0%, 100% { background-size: 100% 100%; }
            50% { background-size: 120% 120%; }
        }

        /* --- 触觉星河画布 --- */
        #stardust-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        /* --- 霜雪隐喻（起雾的窗） --- */
        #fog-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 900; opacity: 0; transition: opacity 2s ease;
        }
        body.fogged #fog-canvas { opacity: 1; pointer-events: auto; cursor: crosshair; }

        /* --- 风过留痕：清禾光影 --- */
        .herbal-shadow {
            position: fixed; bottom: -2vh; left: 50%; width: 60vw; height: 40vh;
            transform: translateX(-50%); z-index: 1; pointer-events: none; opacity: 0.15;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 100 C40 60, 20 40, 10 30 C30 45, 45 70, 50 100 M50 100 C60 60, 80 40, 90 30 C70 45, 55 70, 50 100" stroke="%23b87eb5" fill="none" stroke-width="1.5"/></svg>') no-repeat center bottom;
            background-size: contain;
            animation: sway 12s infinite ease-in-out alternate;
            filter: blur(2px);
        }
        body.theme-night .herbal-shadow { stroke: "%23c99bc6"; opacity: 0.08; filter: blur(3px); }
        @keyframes sway {
            from { transform: translateX(-50%) rotate(-4deg); }
            to { transform: translateX(-50%) rotate(4deg); }
        }

        .header {
            text-align: center; margin-bottom: 10px; z-index: 20;
            padding: 10px; transform: translateZ(40px);
        }

        .header h1 {
            font-size: 1.6rem; font-weight: 300; letter-spacing: 6px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-main); text-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); 
        }

        .art-text {
            font-family: "Georgia", "Nimbus Roman No9 L", "Songti SC", "STSong", serif;
            font-size: 2.3rem; font-style: italic;
            background: var(--art-text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-right: 12px; position: relative; padding-right: 4px;
        }

        .art-text::after {
            content: ''; position: absolute; right: -4px; top: 25%;
            height: 50%; width: 1px; background: rgba(184, 126, 181, 0.4); 
        }

        /* --- 专属时光流转刻度 --- */
        .timekeeper {
            font-family: -apple-system, "Noto Serif SC", serif;
            font-size: 0.75rem; color: var(--text-muted);
            letter-spacing: 2px; font-weight: 300;
            margin-bottom: 25px; transform: translateZ(30px);
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.2);
            z-index: 20;
        }

        .glass-container {
            width: 100%; max-width: 440px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 28px; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); padding: 24px 20px;
            position: relative; z-index: 10;
            transform-style: preserve-3d; transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 【时间静止结界】状态 */
        body.time-stop .glass-container {
            background: transparent; border-color: transparent; box-shadow: none; backdrop-filter: none; -webkit-backdrop-filter: none;
        }
        body.time-stop .btn-grid { opacity: 0; pointer-events: none; transform: translateZ(0) scale(0.9); }
        body.time-stop .footer-wrapper { transform: translateY(-30vh) translateZ(50px) scale(1.1); }
        body.time-stop .love-quote { opacity: 1; text-shadow: 0 0 20px rgba(255,255,255,0.8); }

        .btn-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            transform: translateZ(30px); transform-style: preserve-3d;
            transition: all 1s ease;
        }

        .glass-btn {
            position: relative; overflow: hidden; 
            background: var(--btn-glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 14px; 
            padding: 12px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-main); font-size: 0.85rem; font-weight: 400; letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateZ(0); 
        }

        .glass-btn i, .glass-btn .btn-text, .glass-btn .card-text { position: relative; z-index: 2; transition: filter 0.8s ease; }

        .glass-btn:active {
            transform: translateY(2px) scale(0.92) translateZ(-5px);
            background: var(--glass-bg); border-color: var(--accent-color);
        }

        .full-width { grid-column: span 2; flex-direction: row; gap: 12px; padding: 14px 20px; justify-content: flex-start; }
        .glass-btn i { font-size: 1.15rem; margin-bottom: 6px; color: var(--accent-color); opacity: 0.95; }
        .full-width i { margin-bottom: 0; font-size: 1.25rem; }

        /* --- 融入血液的无字情书 --- */
        #editable-card {
            background: var(--glass-bg); border: 1px dashed rgba(184, 126, 181, 0.3); justify-content: center;
        }
        .card-text {
            width: 100%; text-align: center; outline: none; word-break: break-all;
            color: var(--text-main); transition: all 1.5s ease;
            text-shadow: 0 0 10px rgba(184, 126, 181, 0.4); /* 深嵌玻璃底层的光晕感 */
        }
        /* 当失焦时，宛如墨水融入血液，字迹呈现半透明凝胶状，但绝不消失 */
        #editable-card:not(.editing) .card-text {
            color: rgba(142, 100, 150, 0.65);
            text-shadow: 0px 1px 3px rgba(0, 0, 0, 0.05), inset 0 1px 2px rgba(255,255,255,0.2);
            mix-blend-mode: multiply;
        }
        body.theme-night #editable-card:not(.editing) .card-text {
            color: rgba(220, 190, 230, 0.65); mix-blend-mode: screen;
        }

        .glass-btn.editing {
            background: var(--bg-base); border: 1px solid var(--accent-color) !important;
            transform: scale(1.02) translateZ(10px);
        }

        .footer-wrapper {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 25px; z-index: 20; text-align: center; padding-bottom: 20px;
            transform: translateZ(20px); transition: all 1.5s ease;
        }

        /* 【水滴石穿】岁月的无声溶解动效 */
        .love-quote {
            font-family: "STKaiti", "KaiTi", serif; font-size: 0.95rem; color: var(--text-main);
            opacity: 0.9; font-style: italic; margin-bottom: 12px; letter-spacing: 1.5px;
            max-width: 92%; line-height: 1.6; cursor: pointer;
            transition: opacity 1.5s ease, filter 1.5s ease, transform 1.5s ease;
        }
        .love-quote.fade-out { opacity: 0; filter: blur(8px); transform: scale(0.95); }

        .copyright {
            font-size: 0.75rem; color: var(--text-muted); font-weight: 300;
            letter-spacing: 3px; text-transform: uppercase;
        }

        /* --- 【黑夜之锚】60 BPM 同频安抚 --- */
        #night-anchor-orb {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 160, 220, 0.8) 0%, transparent 70%);
            box-shadow: 0 0 40px rgba(200, 160, 220, 0.5);
            z-index: 9999; pointer-events: none; opacity: 0;
            transition: opacity 2s ease;
        }
        body.anchor-active #night-anchor-orb {
            opacity: 1;
            /* 60 BPM = 每秒1次完整呼吸律动 (0.5s吸 0.5s呼过于急促，医学上舒缓心跳采用 1s 吸 1s 呼的柔和过渡) */
            animation: bpm60 2s infinite ease-in-out;
        }
        body.anchor-active .glass-container, body.anchor-active .header, body.anchor-active .footer-wrapper {
            opacity: 0 !important; filter: blur(10px);
        }
        @keyframes bpm60 {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* 霜雪隐喻控制按钮 (极微小) */
        .fog-btn {
            position: fixed; bottom: 20px; right: 20px; font-size: 0.8rem;
            color: var(--text-muted); z-index: 30; opacity: 0.3; cursor: pointer;
        }

        #toast {
            visibility: hidden; min-width: 180px; background: rgba(92, 67, 102, 0.85); color: #fff;
            text-align: center; border-radius: 14px; padding: 10px 18px; position: fixed; z-index: 1000; left: 50%; top: 30px;
            transform: translateX(-50%); font-size: 0.85rem; letter-spacing: 0.5px; backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.4s, top 0.4s;
        }
        #toast.show { visibility: visible; opacity: 1; top: 45px; }
    </style>
</head>
<body>

    <canvas id="stardust-canvas"></canvas>
    <canvas id="fog-canvas"></canvas>
    <div id="night-anchor-orb"></div>

    <!-- 顶部点击激活 3D 感应，双击调用管家 -->

            <button id="btn-qq3" class="glass-btn" onclick="executeAction('btn-qq3')" ondblclick="editAction('btn-qq3')"><i class="fa-brands fa-qq"></i><span class="btn-text">QQ</span></button>
            <button id="btn-qq4" class="glass-btn" onclick="executeAction('btn-qq4')" ondblclick="editAction('btn-qq4')"><i class="fa-brands fa-qq"></i><span class="btn-text">QQ</span></button>

            <button id="btn-mail1" class="glass-btn" onclick="executeAction('btn-mail1')" ondblclick="editAction('btn-mail1')"><i class="fa-solid fa-envelope"></i><span class="btn-text">Email</span></button>
            <button id="btn-mail2" class="glass-btn" onclick="executeAction('btn-mail2')" ondblclick="editAction('btn-mail2')"><i class="fa-solid fa-envelope"></i><span class="btn-text">Email</span></button>

            <button id="btn-sub1" class="glass-btn" onclick="executeAction('btn-sub1')" ondblclick="editAction('btn-sub1')"><i class="fa-solid fa-satellite-dish"></i><span class="btn-text">清禾</span></button>
            <button id="btn-sub2" class="glass-btn" onclick="executeAction('btn-sub2')" ondblclick="editAction('btn-sub2')"><i class="fa-solid fa-satellite-dish"></i><span class="btn-text">清禾</span></button>

            <!-- 融入血液的无字情书 -->

    <div class="footer-wrapper">
        <div id="love-quote" class="love-quote" onclick="triggerNextQuote()">加载中...</div>
        <!-- 长按底部版权进入黑夜之锚 -->

    </div>
    
    <div class="fog-btn" onclick="toggleFog()"><i class="fa-solid fa-snowflake"></i></div>
    <div id="toast">提示信息</div>

    <script>
        // ==========================================
        // 核心配置区
        // ==========================================
        const GITHUB_OWNER = 'zkaydhl'; 
        const GITHUB_REPO = 'zkaydhl.github.io';       
        const CONFIG_FILE_PATH = 'config.json';     
        const BRANCH = 'main';   
        
        // 【专属时光流转刻度】(您可以修改这里的日期为你们的纪念日，格式：YYYY-MM-DD)
        const LOVE_START_DATE = new Date('2024-01-01T00:00:00');                   

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
        }

        // --- 跨越光年的「月相共鸣」算法 ---
        function updateLunarPhase() {
            // 简单月相周期算法 (基于 1970-01-01)
            const cycle = 29.5305882;
            const now = new Date().getTime() / 86400000;
            const newMoon = new Date('1970-01-07T20:35:00').getTime() / 86400000;
            const phase = ((now - newMoon) % cycle) / cycle;
            
            // 0=新月(最暗), 0.5=满月(最亮)
            let lum = 1;
            if (phase < 0.5) lum = 0.5 + (phase * 2) * 0.5;
            else lum = 1.0 - ((phase - 0.5) * 2) * 0.5;
            
            // 动态注入亮度因子
            document.documentElement.style.setProperty('--moon-lum', lum.toFixed(2));
        }

        // --- 动态时间环境光系统 ---
        function applyTimeTheme() {
            updateLunarPhase();
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 10) document.body.className = 'theme-morning';
            else if (hour >= 18 || hour < 6) document.body.className = 'theme-night';
            else document.body.className = ''; 
        }
        applyTimeTheme();
        setInterval(applyTimeTheme, 60000);

        // --- 专属时光流转刻度计时器 ---
        function updateTimekeeper() {
            const now = new Date();
            const diff = now - LOVE_START_DATE;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timekeeper').innerText = `已相守 ${d} 天 ${h} 小时 ${m} 分 ${s} 秒`;
        }
        setInterval(updateTimekeeper, 1000);

        // --- 「指尖星河」触觉涟漪 (Canvas) ---
        const starCanvas = document.getElementById('stardust-canvas');
        const ctxStar = starCanvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createParticle(x, y) {
            particles.push({
                x: x, y: y,
                size: Math.random() * 2 + 1,
                speedX: (Math.random() - 0.5) * 1.5,
                speedY: (Math.random() - 0.5) * 1.5,
                life: 1
            });
        }
        
        function animateStardust() {
            ctxStar.clearRect(0, 0, starCanvas.width, starCanvas.height);
            // 依据主题改变星尘颜色
            const isNight = document.body.classList.contains('theme-night');
            ctxStar.fillStyle = isNight ? 'rgba(201, 155, 198, ' : 'rgba(184, 126, 181, '; 
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.speedX; p.y += p.speedY; p.life -= 0.02;
                if (p.life > 0) {
                    ctxStar.globalAlpha = p.life;
                    ctxStar.beginPath();
                    ctxStar.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctxStar.fill();
                } else {
                    particles.splice(i, 1); i--;
                }
            }

        function initLoveQuote() {

                }
