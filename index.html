<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#b87eb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f33f.png">
    
    <title>清禾后花园</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --moon-opacity: 1;
            --bg-grad-1: 216, 180, 248; --bg-grad-2: 255, 204, 225;
            --bg-grad-3: 238, 224, 255; --bg-grad-4: 255, 218, 233;
            --bg-base: #fbf6fa;
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.15) 100%);
            --glass-border: rgba(255, 255, 255, 0.65);
            --text-main: #5c4366; --text-muted: rgba(92, 67, 102, 0.65);
            --btn-glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.1) 100%);
            --accent-color: #b87eb5; 
        }

        body.theme-night {
            --bg-base: #0f0a14;
            --bg-grad-1: 60, 35, 90; --bg-grad-2: 85, 45, 85;
            --bg-grad-3: 30, 15, 50; --bg-grad-4: 45, 20, 55;
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #dfcce8; --text-muted: rgba(223, 204, 232, 0.5);
            --btn-glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            --accent-color: #c99bc6; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Noto Serif SC", "STKaiti", "KaiTi", serif; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 20% 20%, rgba(var(--bg-grad-1), calc(0.85 * var(--moon-opacity))) 0px, transparent 55%),
                radial-gradient(at 80% 20%, rgba(var(--bg-grad-2), calc(0.85 * var(--moon-opacity))) 0px, transparent 55%),
                radial-gradient(at 80% 80%, rgba(var(--bg-grad-3), calc(0.7 * var(--moon-opacity))) 0px, transparent 55%),
                radial-gradient(at 20% 80%, rgba(var(--bg-grad-4), calc(0.7 * var(--moon-opacity))) 0px, transparent 55%);
            background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            padding: 50px 20px 40px 20px; overflow-x: hidden; overflow-y: auto; color: var(--text-main);
            transition: background-color 3s ease, color 2s ease; perspective: 1200px; animation: breath 8s infinite ease-in-out; 
        }

        @keyframes breath { 0%, 100% { background-size: 100% 100%; } 50% { background-size: 115% 115%; } }

        #stardust-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }
        #fog-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 900; opacity: 0; transition: opacity 2s ease; }
        body.fogged #fog-canvas { opacity: 1; pointer-events: auto; touch-action: none; }

        .herbal-shadow { position: fixed; bottom: -2vh; left: 50%; width: 60vw; height: 40vh; transform: translateX(-50%); z-index: 1; pointer-events: none; opacity: 0.15; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 100 C40 60, 20 40, 10 30 C30 45, 45 70, 50 100 M50 100 C60 60, 80 40, 90 30 C70 45, 55 70, 50 100" stroke="%23b87eb5" fill="none" stroke-width="1.5"/></svg>') no-repeat center bottom; background-size: contain; animation: sway 12s infinite ease-in-out alternate; filter: blur(2px); }
        body.theme-night .herbal-shadow { opacity: 0.08; filter: blur(3px); }
        @keyframes sway { from { transform: translateX(-50%) rotate(-4deg); } to { transform: translateX(-50%) rotate(4deg); } }

        .header { text-align: center; margin-bottom: 10px; z-index: 20; padding: 10px; transform: translateZ(40px); cursor: pointer; }
        .header h1 { font-size: 1.6rem; font-weight: 300; letter-spacing: 6px; color: var(--text-main); text-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); }
        .art-text { font-family: "Georgia", serif; font-size: 2.3rem; font-style: italic; color: var(--accent-color); margin-right: 12px; }
        .timekeeper { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 300; margin-bottom: 25px; transform: translateZ(30px); z-index: 20; text-align: center; }

        .glass-container { width: 100%; max-width: 440px; background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 28px; border: 1px solid var(--glass-border); padding: 24px 20px; position: relative; z-index: 10; transform-style: preserve-3d; transition: all 1.5s ease; margin-bottom: 20px;}
        body.time-stop .glass-container { background: transparent; border-color: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; box-shadow: none; }
        body.time-stop .btn-grid, body.time-stop .gb-area { opacity: 0; pointer-events: none; transform: translateZ(0) scale(0.9); }
        body.time-stop .footer-wrapper { transform: translateY(-20vh) translateZ(50px) scale(1.1); }
        body.time-stop .love-quote { opacity: 1; text-shadow: 0 0 20px rgba(255,255,255,0.8); }

        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; transform: translateZ(30px); transition: all 1s ease; }
        .glass-btn { background: var(--btn-glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-main); font-size: 0.85rem; font-weight: 400; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); transition: all 0.2s ease; }
        .full-width { grid-column: span 2; flex-direction: row; gap: 12px; justify-content: flex-start; padding: 14px 20px; }
        .glass-btn i { font-size: 1.15rem; margin-bottom: 6px; color: var(--accent-color); }
        .full-width i { margin-bottom: 0; font-size: 1.25rem; }
        .glass-btn:active { transform: translateY(2px) scale(0.95); background: var(--glass-bg); border-color: var(--accent-color); }

        #editable-card { background: var(--glass-bg); border: 1px dashed rgba(184, 126, 181, 0.3); justify-content: center; }
        .card-text { width: 100%; text-align: center; outline: none; word-break: break-all; transition: all 1.5s ease; opacity: 1; }
        #editable-card:not(.editing) .card-text { opacity: 0.95; }
        .glass-btn.editing { background: var(--bg-base); border: 1px solid var(--accent-color) !important; transform: scale(1.02); }

        /* --- 留言板样式 --- */
        .gb-area { transform: translateZ(30px); transition: all 1s ease; }
        .gb-header { font-size: 1.05rem; font-weight: 400; text-align: center; margin-bottom: 20px; color: var(--text-main); letter-spacing: 2px;}
        .gb-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; padding-right: 5px;}
        .gb-item { background: rgba(255,255,255,0.3); border: 1px solid var(--glass-border); border-radius: 14px; padding: 15px; user-select: text; -webkit-user-select: text;}
        body.theme-night .gb-item { background: rgba(255,255,255,0.03); }
        .gb-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; border-bottom: 1px dashed rgba(184, 126, 181, 0.2); padding-bottom: 5px; align-items: center;}
        .gb-meta-right { display: flex; align-items: center; gap: 8px; }
        .gb-delete { cursor: pointer; opacity: 0.4; transition: 0.3s; padding: 2px 5px; }
        .gb-delete:active { opacity: 1; color: #ff4d4f; }
        .gb-content { font-size: 0.9rem; line-height: 1.5; color: var(--text-main); word-break: break-word;}
        
        .gb-img { max-height: 120px; width: auto; max-width: 100%; object-fit: cover; border-radius: 8px; margin-top: 10px; cursor: zoom-in; opacity: 0.95; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: opacity 0.3s ease; display: block;}
        .gb-img:hover { opacity: 1; }
        .gb-video { max-width: 100%; border-radius: 8px; margin-top: 10px; background: rgba(0,0,0,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.08); outline: none; }
        
        .gb-form { background: var(--glass-bg); border-radius: 14px; padding: 15px; border: 1px dashed rgba(184, 126, 181, 0.3); }
        .gb-input { width: 100%; background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; color: var(--text-main); outline: none; margin-bottom: 10px; font-size: 0.85rem; user-select: text; -webkit-user-select: text;}
        body.theme-night .gb-input { background: rgba(255,255,255,0.05); color: #dfcce8; }
        .gb-input::placeholder { color: var(--text-muted); opacity: 0.6;}
        textarea.gb-input { resize: vertical; min-height: 80px; }
        .gb-actions { display: flex; justify-content: space-between; align-items: center; }
        .gb-btn { background: var(--btn-glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; padding: 8px 15px; color: var(--text-main); font-size: 0.8rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 5px;}
        .gb-btn.primary { background: rgba(184, 126, 181, 0.2); border-color: var(--accent-color); color: var(--accent-color); }
        .gb-btn:active { transform: scale(0.95); }

        .footer-wrapper { display: flex; flex-direction: column; align-items: center; margin-top: 5px; z-index: 20; transition: all 1.5s ease; padding-bottom: 20px; }
        .love-quote { font-family: "STKaiti", "KaiTi", serif; font-size: 0.95rem; color: var(--text-main); opacity: 0.9; margin-bottom: 12px; max-width: 92%; line-height: 1.6; transition: all 1.5s ease; text-align: center; cursor: pointer; }
        .love-quote.fade-out { opacity: 0; filter: blur(8px); transform: scale(0.95); }
        .copyright { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 3px; cursor: pointer; }

        #night-anchor-orb { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(200, 160, 220, 0.8) 0%, transparent 70%); z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 2s ease; }
        body.anchor-active #night-anchor-orb { opacity: 1; animation: bpm60 2s infinite ease-in-out; }
        body.anchor-active .glass-container, body.anchor-active .header, body.anchor-active .timekeeper, body.anchor-active .footer-wrapper { opacity: 0 !important; filter: blur(10px); }
        @keyframes bpm60 { 0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        .fog-btn { position: fixed; bottom: 20px; right: 20px; font-size: 0.8rem; color: var(--text-muted); z-index: 30; opacity: 0.3; cursor: pointer; padding: 10px; }
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: rgba(92, 67, 102, 0.85); color: #fff; padding: 10px 18px; border-radius: 14px; font-size: 0.85rem; opacity: 0; transition: 0.4s; z-index: 1000; pointer-events: none; }
        #toast.show { opacity: 1; top: 45px; }
        #loader { position: fixed; top: 15px; right: 15px; font-size: 0.85rem; color: var(--accent-color); background: rgba(255,255,255,0.6); padding: 5px 12px; border-radius: 20px; z-index: 2000; display: none; backdrop-filter: blur(5px); }

        /* 零重排独立灯箱样式 */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 99999; display: none; justify-content: center; align-items: center;
        }
        #lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>
    <div class="herbal-shadow"></div>
    <canvas id="stardust-canvas"></canvas>
    <canvas id="fog-canvas"></canvas>
    <div id="night-anchor-orb"></div>
    
    <div class="header" onclick="if(!window.isLongPressFired) initGyroscope()" oncontextmenu="return false;">
        <h1><span class="art-text">清禾</span>后花园</h1>
    </div>
    
    <div class="timekeeper" id="timekeeper">已相守 0 天 0 小时 0 分 0 秒</div>

    <div class="glass-container" id="tilt-card">
        <div class="btn-grid" id="btn-grid-container">
            <button class="glass-btn full-width"><i class="fa-solid fa-spinner fa-spin"></i><span class="btn-text">空间折跃中...</span></button>
        </div>
    </div>

    <div class="glass-container" id="gb-container" style="display:none;">
        <div class="gb-area">
            <h2 class="gb-header"><i class="fa-solid fa-feather-pointed"></i> 时光胶囊</h2>
            <div class="gb-list" id="gb-list"></div>
            
            <div class="gb-form">
                <input type="text" id="gb-name" class="gb-input" placeholder="您的专属印记 (昵称)">
                <textarea id="gb-text" class="gb-input" placeholder="输入纯文本，或用 [video]视频链接[/video] 插入视频..."></textarea>
                <input type="file" id="gb-image" accept="image/*" style="display:none;" onchange="previewImage(this)">
                
                <img id="gb-preview" style="display:none; max-width:100px; border-radius:8px; margin-bottom:10px; cursor:zoom-in;" onclick="openLightbox(this.src)">
                
                <div class="gb-actions">
                    <button class="gb-btn" onclick="document.getElementById('gb-image').click()"><i class="fa-solid fa-camera"></i> 影像</button>
                    <button class="gb-btn primary" onclick="submitGuestbook()"><i class="fa-solid fa-paper-plane"></i> 封存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-wrapper">
        <div id="love-quote" class="love-quote" onclick="triggerNextQuote()">加载中...</div>
        <div class="copyright" id="copyright-anchor">&mdash;&nbsp; 清禾 &nbsp;&mdash;</div>
    </div>
    
    <div class="fog-btn" onclick="toggleFog()"><i class="fa-solid fa-snowflake"></i></div>
    <div id="toast"></div>
    <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i></div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="时光留影">
    </div>

    <script>
        // ==========================================
        // 核心配置区
        // ==========================================
        const GITHUB_OWNER = 'zkaydhl'; 
        const GITHUB_REPO = 'zkaydhl.github.io';       
        const CONFIG_FILE_PATH = 'config.json';     
        const GUESTBOOK_FILE_PATH = 'guestbook.json'; 
        
        const CF_WORKER_URL = 'https://adc.baoxbing.workers.dev'; 

        const LOVE_START_DATE = new Date('2018-05-03T00:00:00');                   
        const PUBLIC_READ_KEY = "126483";

        // ==========================================
        // 零重排灯箱引擎
        // ==========================================
        function openLightbox(src) {
            if (!src) return;
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        // ==========================================
        // 核心交互：全局长按引擎
        // ==========================================
        window.longPressTimer = null;
        window.isLongPressFired = false;
        window.pressStartX = 0; window.pressStartY = 0;

        function startPress(e, callback) {
            if (e.touches && e.touches.length > 0) { window.pressStartX = e.touches[0].clientX; window.pressStartY = e.touches[0].clientY; }
            window.isLongPressFired = false;
            window.longPressTimer = setTimeout(() => {
                window.isLongPressFired = true;
                if(navigator.vibrate) navigator.vibrate(40); 
                callback();
            }, 600); 
        }
        function cancelPress(e) {
            if (e && e.type === 'touchmove' && e.touches && e.touches.length > 0) {
                const dx = e.touches[0].clientX - window.pressStartX; const dy = e.touches[0].clientY - window.pressStartY;
                if(Math.sqrt(dx*dx + dy*dy) < 10) return; 
            }
            clearTimeout(window.longPressTimer);
            setTimeout(() => { window.isLongPressFired = false; }, 300);
        }

        // ==========================================
        // UI & 动效引擎
        // ==========================================
        function updateTheme() {
            const cycle = 29.5305882;
            const phase = ((new Date().getTime() / 86400000 - new Date('1970-01-07T20:35:00').getTime() / 86400000) % cycle) / cycle;
            let lum = phase < 0.5 ? 0.5 + phase : 1.5 - phase;
            document.documentElement.style.setProperty('--moon-opacity', lum.toFixed(2));
            const hour = new Date().getHours(); document.body.className = (hour >= 18 || hour < 6) ? 'theme-night' : '';
        }
        updateTheme(); setInterval(updateTheme, 60000);

        setInterval(() => {
            const diff = new Date() - LOVE_START_DATE;
            document.getElementById('timekeeper').innerText = `已相守 ${Math.floor(diff/86400000)} 天 ${Math.floor((diff/3600000)%24)} 小时 ${Math.floor((diff/60000)%60)} 分 ${Math.floor((diff/1000)%60)} 秒`;
        }, 1000);

        const ctxStar = document.getElementById('stardust-canvas').getContext('2d');
        let particles = [];
        function resizeCanvas() { ctxStar.canvas.width = window.innerWidth; ctxStar.canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function animateStardust() {
            ctxStar.clearRect(0, 0, ctxStar.canvas.width, ctxStar.canvas.height);
            ctxStar.fillStyle = document.body.classList.contains('theme-night') ? 'rgba(201, 155, 198, ' : 'rgba(184, 126, 181, ';
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i]; p.x += p.speedX; p.y += p.speedY; p.life -= 0.02;
                if (p.life > 0) { ctxStar.globalAlpha = p.life; ctxStar.beginPath(); ctxStar.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctxStar.fill(); } 
                else { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animateStardust);
        }
        animateStardust();
        document.addEventListener('touchmove', (e) => { for(let i=0; i<2; i++) particles.push({x: e.touches[0].clientX, y: e.touches[0].clientY, size: Math.random()*2+1, speedX: (Math.random()-0.5)*1.5, speedY: (Math.random()-0.5)*1.5, life: 1}); }, {passive: true});
        document.addEventListener('mousemove', (e) => { for(let i=0; i<2; i++) particles.push({x: e.clientX, y: e.clientY, size: Math.random()*2+1, speedX: (Math.random()-0.5)*1.5, speedY: (Math.random()-0.5)*1.5, life: 1}); });

        const ctxFog = document.getElementById('fog-canvas').getContext('2d');
        let isFogged = false;
        function toggleFog() {
            isFogged = !isFogged;
            if(isFogged) {
                ctxFog.canvas.width = window.innerWidth; ctxFog.canvas.height = window.innerHeight;
                ctxFog.fillStyle = 'rgba(255, 255, 255, 0.75)'; ctxFog.fillRect(0, 0, ctxFog.canvas.width, ctxFog.canvas.height);
                ctxFog.lineCap = 'round'; ctxFog.lineJoin = 'round'; ctxFog.lineWidth = 45;
                document.body.classList.add('fogged'); showToast("❄️ 窗户起雾了");
            } else document.body.classList.remove('fogged');
        }
        function wipeFog(e) { e.preventDefault(); let x = e.touches ? e.touches[0].clientX : e.clientX; let y = e.touches ? e.touches[0].clientY : e.clientY; ctxFog.globalCompositeOperation = 'destination-out'; ctxFog.lineTo(x, y); ctxFog.stroke(); ctxFog.beginPath(); ctxFog.moveTo(x, y); }
        const fogC = document.getElementById('fog-canvas');
        fogC.addEventListener('touchstart', (e) => { ctxFog.beginPath(); ctxFog.moveTo(e.touches[0].clientX, e.touches[0].clientY); fogC.addEventListener('touchmove', wipeFog, {passive: false}); }, {passive: false});
        fogC.addEventListener('touchend', () => fogC.removeEventListener('touchmove', wipeFog));

        const tiltCard = document.getElementById('tilt-card');
        let timeStopTimer, anchorTimer, anchorStartY;
        tiltCard.addEventListener('touchstart', (e) => { if(e.target.closest('.glass-btn')) return; anchorStartY = e.touches[0].clientY; timeStopTimer = setTimeout(() => { document.body.classList.add('time-stop'); if(navigator.vibrate) navigator.vibrate(50); }, 1200); });
        tiltCard.addEventListener('touchmove', (e) => { if(Math.abs(e.touches[0].clientY - anchorStartY) > 10) clearTimeout(timeStopTimer); }, {passive: true});
        tiltCard.addEventListener('touchend', () => { clearTimeout(timeStopTimer); document.body.classList.remove('time-stop'); });

        const copyAnchor = document.getElementById('copyright-anchor');
        copyAnchor.addEventListener('touchstart', (e) => { anchorStartY = e.touches[0].clientY; if(new Date().getHours() >= 21 || new Date().getHours() < 6) anchorTimer = setTimeout(() => { document.body.classList.add('anchor-active'); if(navigator.vibrate) navigator.vibrate(50); }, 1200); else showToast("🌙 待夜深人静时"); });
        copyAnchor.addEventListener('touchmove', (e) => { if(Math.abs(e.touches[0].clientY - anchorStartY) > 10) clearTimeout(anchorTimer); }, {passive: true});
        copyAnchor.addEventListener('touchend', () => { clearTimeout(anchorTimer); document.body.classList.remove('anchor-active'); });

        let gyroEnabled = false;
        function initGyroscope() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => { if (state === 'granted') { bindGyroscope(); showToast("🌟 3D 空间激活"); } }).catch(console.error);
            } else { bindGyroscope(); }
        }
        function bindGyroscope() { gyroEnabled = true; window.addEventListener("deviceorientation", (e) => { if(!e.beta || !e.gamma) return; const x = Math.max(-15, Math.min(15, e.beta - 45)) / 2; const y = Math.max(-15, Math.min(15, e.gamma)) / 2; tiltCard.style.transform = `rotateX(${-x}deg) rotateY(${y}deg)`; }, true); }

        // ==========================================
        // 极客安全防线 (CF版幽灵验证)
        // ==========================================
        let isSessionUnlocked = false; 
        let sessionTimer = null;
        let currentAdminPassword = null; 

        function resetSessionTimer() {
            if (!isSessionUnlocked) return;
            clearTimeout(sessionTimer);
            sessionTimer = setTimeout(() => {
                isSessionUnlocked = false; 
                currentAdminPassword = null;
                document.removeEventListener('touchstart', resetSessionTimer);
            }, 3 * 60 * 1000); 
        }

        function requireAuth() {
            if (isSessionUnlocked && currentAdminPassword) { resetSessionTimer(); return true; }
            
            const pwd = prompt("..."); 
            if (pwd === "0000") { localStorage.clear(); location.reload(); return false; } 
            if (pwd) {
                currentAdminPassword = pwd;
                isSessionUnlocked = true; 
                document.addEventListener('touchstart', resetSessionTimer); 
                resetSessionTimer(); 
                showToast("权限已接管"); 
                return true; 
            }
            return false;
        }

        // ==========================================
        // 核心数据拉取与解密引擎
        // ==========================================
        let currentConfig = {
            'btn-gv': { type: 'tel', value: '+15134528504', labelName: 'Google Voice 拨号', updateText: true },
            'btn-tg': { type: 'url', value: 'https://t.me/S_ohye', labelName: 'Telegram 链接', updateText: false },
            'btn-sig1': { type: 'url', value: 'https://signal.me/#eu/Sohye.01', labelName: 'Signal 1 链接', updateText: false },
            'btn-sig2': { type: 'url', value: 'https://signal.me/#eu/XSohye.01', labelName: 'Signal 2 链接', updateText: false },
            'btn-wx1': { type: 'copy', value: 'S_ohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx2': { type: 'copy', value: 'GS_ohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx3': { type: 'copy', value: 'X_Sohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx4': { type: 'copy', value: 'LSD_Awaits', labelName: 'wechat 账号', updateText: false },
            'btn-wx5': { type: 'copy', value: 'XSohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx6': { type: 'copy', value: 'GSohye', labelName: 'wechat 账号', updateText: false },
            'btn-qq1': { type: 'url', value: 'https://qm.qq.com/q/sN4qlwcFaK', labelName: 'QQ 1 链接', updateText: false },
            'btn-qq2': { type: 'url', value: 'https://qm.qq.com/q/KRDTjjZCuW', labelName: 'QQ 2 链接', updateText: false },
            'btn-qq3': { type: 'url', value: 'https://qm.qq.com/q/6M3QXQtas8', labelName: 'QQ 3 链接', updateText: false },
            'btn-qq4': { type: 'url', value: 'https://qm.qq.com/q/kG9SsHCI80', labelName: 'QQ 4 链接', updateText: false },
            'btn-mail1': { type: 'email', value: 'zkaydhl@gmail.com', labelName: 'Gmail 1 邮箱', updateText: false },
            'btn-mail2': { type: 'email', value: 'baoxbing@gmail.com', labelName: 'Gmail 2 邮箱', updateText: false },
            'btn-sub1': { type: 'copy', value: 'https://link.oness.xyz/link/U3RpRccH6QoAuIbw?clash=4', labelName: '翻墙订阅 1', updateText: false },
            'btn-sub2': { type: 'copy', value: 'https://liangxin.xyz/api/v1/liangxin?OwO=bfd1cb6c35304d706f3be5eddb9ec76f', labelName: '翻墙订阅 2', updateText: false },
            // 🌟 新增的钱包模块配置
            'btn-eth': { type: 'copy', value: '0x495901Af948c7bd7401Cf020b2F034385E807249', labelName: 'ETH 钱包地址', updateText: false },
            'btn-trx': { type: 'copy', value: 'TMGukNPsiYUCMrdzUgrbHTnqBDfgw1hqr9', labelName: 'TRX 钱包地址', updateText: false },
            'memo-card': { type: 'memo', value: '长按留下时光的印记', labelName: '无字情书', updateText: false }
        };
        let fileSha = null;
        
        let guestbookData = [];
        let gbFileSha = null;

        const encodeBase64 = str => btoa(unescape(encodeURIComponent(str)));
        const decodeBase64 = str => decodeURIComponent(escape(atob(str)));
        const encryptData = (data, key) => CryptoJS.AES.encrypt(JSON.stringify(data), key).toString();
        const decryptDataObj = (ciphertext, key) => JSON.parse(CryptoJS.AES.decrypt(ciphertext, key).toString(CryptoJS.enc.Utf8));

        document.addEventListener('DOMContentLoaded', async () => {
            initLoveQuote(); 
            document.getElementById('loader').style.display = 'block';
            
            const fetchConfig = fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${CONFIG_FILE_PATH}?t=${new Date().getTime()}`).catch(()=>null);
            const fetchGb = fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GUESTBOOK_FILE_PATH}?t=${new Date().getTime()}`).catch(()=>null);
            
            try {
                const [resConf, resGb] = await Promise.all([fetchConfig, fetchGb]);
                
                if (resConf && resConf.ok) {
                    const data = await resConf.json(); fileSha = data.sha;
                    const content = JSON.parse(decodeBase64(data.content));
                    if (content.encrypted) {
                        try { currentConfig = decryptDataObj(content.data, PUBLIC_READ_KEY); } catch(e) {}
                    } else { currentConfig = content; }
                    
                    // 兼容旧数据中没有钱包键值的情况
                    if (!currentConfig['btn-eth']) currentConfig['btn-eth'] = { type: 'copy', value: '0x495901Af948c7bd7401Cf020b2F034385E807249', labelName: 'ETH 钱包地址', updateText: false };
                    if (!currentConfig['btn-trx']) currentConfig['btn-trx'] = { type: 'copy', value: 'TMGukNPsiYUCMrdzUgrbHTnqBDfgw1hqr9', labelName: 'TRX 钱包地址', updateText: false };
                }
                
                if (resGb && resGb.ok) {
                    const data = await resGb.json(); gbFileSha = data.sha;
                    const content = JSON.parse(decodeBase64(data.content));
                    if (content.encrypted) {
                        try { guestbookData = decryptDataObj(content.data, PUBLIC_READ_KEY); } catch(e) {}
                    } else { guestbookData = content; }
                }
            } catch(e) {} 
            finally { 
                document.getElementById('loader').style.display = 'none'; 
                renderUI(currentConfig); 
                renderGuestbook();
                document.getElementById('gb-container').style.display = 'block';
            }
        });

        function renderUI(config) {
            const container = document.getElementById('btn-grid-container');
            container.innerHTML = '';
            const renderBtn = (id, icon, defaultText, isFull = false) => {
                if(!config[id]) return '';
                const display = config[id].updateText ? config[id].value : defaultText;
                return `<button id="${id}" class="glass-btn ${isFull?'full-width':''}" 
                            onclick="if(!window.isLongPressFired) executeAction('${id}')" 
                            onmousedown="startPress(event, () => editAction('${id}'))" onmouseup="cancelPress(event)" onmouseleave="cancelPress(event)" 
                            ontouchstart="startPress(event, () => editAction('${id}'))" ontouchend="cancelPress(event)" ontouchmove="cancelPress(event)" oncontextmenu="return false;">
                            <i class="${icon}"></i><span class="btn-text">${display}</span>
                        </button>`;
            };
            let html = '';
            html += renderBtn('btn-gv', 'fa-solid fa-phone-volume', '', true);
            html += renderBtn('btn-tg', 'fa-brands fa-telegram', 'Telegram', true);
            html += renderBtn('btn-sig1', 'fa-solid fa-comment-dots', 'Signal'); html += renderBtn('btn-sig2', 'fa-solid fa-comment-dots', 'Signal');
            for(let i=1; i<=6; i++) html += renderBtn(`btn-wx${i}`, 'fa-brands fa-weixin', 'wechat');
            for(let i=1; i<=4; i++) html += renderBtn(`btn-qq${i}`, 'fa-brands fa-qq', 'QQ');
            html += renderBtn('btn-mail1', 'fa-solid fa-envelope', 'Email'); html += renderBtn('btn-mail2', 'fa-solid fa-envelope', 'Email');
            html += renderBtn('btn-sub1', 'fa-solid fa-satellite-dish', '清禾'); html += renderBtn('btn-sub2', 'fa-solid fa-satellite-dish', '清禾');
            
            // 🌟 钱包按钮区域
            html += renderBtn('btn-eth', 'fa-brands fa-ethereum', 'ETH');
            html += renderBtn('btn-trx', 'fa-solid fa-coins', 'TRX');
            
            const memoText = config['memo-card'] ? config['memo-card'].value : '长按留下时光的印记';
            html += `<div class="glass-btn full-width" id="editable-card" 
                        onmousedown="startPress(event, () => enableMemoEdit(document.getElementById('editable-card')))" onmouseup="cancelPress(event)" onmouseleave="cancelPress(event)" 
                        ontouchstart="startPress(event, () => enableMemoEdit(document.getElementById('editable-card')))" ontouchend="cancelPress(event)" ontouchmove="cancelPress(event)" oncontextmenu="return false;">
                        <div class="card-text">${memoText}</div>
                    </div>`;
            container.innerHTML = html;
        }

        // ==========================================
        // 留言板系统 (多级探针, UBB解析, 点击放大)
        // ==========================================
        let currentCompressedImage = null;

        function renderGuestbook() {
            const list = document.getElementById('gb-list');
            list.innerHTML = guestbookData.length === 0 ? '<div style="text-align:center; color:var(--text-muted); font-size:0.85rem;">这里还是一片空白星域...</div>' : '';
            guestbookData.forEach(item => {
                let safeText = item.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                let parsedText = safeText
                    .replace(/\[video\](.*?)\[\/video\]/gi, '<video src="$1" controls class="gb-video" preload="metadata"></video>')
                    .replace(/\n/g, '<br>');

                const imgHtml = item.img ? `<img src="${item.img}" class="gb-img" onclick="openLightbox(this.src)" alt="时光留影">` : '';
                
                list.innerHTML += `
                    <div class="gb-item">
                        <div class="gb-meta">
                            <span><i class="fa-solid fa-user-astronaut"></i> ${item.name}</span>
                            <div class="gb-meta-right">
                                <span>${item.time} &nbsp;|&nbsp; <i class="fa-solid fa-location-dot"></i> ${item.ip}</span>
                                <span class="gb-delete" onclick="deleteMemory(${item.id})"><i class="fa-solid fa-xmark"></i></span>
                            </div>
                        </div>
                        <div class="gb-content">${parsedText}</div>
                        ${imgHtml}
                    </div>`;
            });
            list.scrollTop = list.scrollHeight;
        }

        async function deleteMemory(id) {
            if (!confirm("确定要将这段记忆彻底抹除吗？")) return;
            if (!requireAuth()) return;

            document.getElementById('loader').style.display = 'block';
            const originalLength = guestbookData.length;
            guestbookData = guestbookData.filter(item => item.id !== id);
            
            if (guestbookData.length === originalLength) {
                document.getElementById('loader').style.display = 'none'; return;
            }

            try {
                const encryptedDataStr = encryptData(guestbookData, PUBLIC_READ_KEY);
                const payloadStr = JSON.stringify({ encrypted: true, data: encryptedDataStr }, null, 2);

                const bodyData = { 
                    path: GUESTBOOK_FILE_PATH,
                    action: "delete", 
                    message: `Delete Memory ${id}`, 
                    content: encodeBase64(payloadStr), 
                    password: currentAdminPassword
                };
                if (gbFileSha) bodyData.sha = gbFileSha;

                const res = await fetch(CF_WORKER_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData)
                });

                if (res.ok) {
                    const responseData = await res.json(); gbFileSha = responseData.content.sha;
                    renderGuestbook(); showToast("✨ 记忆已抹除");
                } else {
                    const errorMsg = await res.json(); alert("抹除失败: " + errorMsg.message); 
                    if(res.status === 401) { isSessionUnlocked = false; currentAdminPassword = null; }
                }
            } catch (err) { alert("网络波动，抹除失败"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        currentCompressedImage = canvas.toDataURL('image/jpeg', 0.6);
                        const prev = document.getElementById('gb-preview');
                        prev.src = currentCompressedImage; prev.style.display = 'block';
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitGuestbook() {
            const name = document.getElementById('gb-name').value.trim() || '匿名旅人';
            const text = document.getElementById('gb-text').value.trim();
            if (!text && !currentCompressedImage) return showToast("写点什么再走吧...");

            document.getElementById('loader').style.display = 'block';
            showToast("正在探测星域定位...");
            
            let ipLoc = '';
            try {
                const res1 = await fetch('https://ipwho.is/?lang=zh-CN').catch(()=>null);
                if (res1 && res1.ok) {
                    const data = await res1.json();
                    if (data.success) ipLoc = data.region === data.city ? data.city : `${data.region || ''} ${data.city || ''}`;
                }
            } catch(e) {}

            if (!ipLoc || ipLoc.trim() === '') {
                try {
                    const res2 = await fetch('https://ipapi.co/json/').catch(()=>null);
                    if (res2 && res2.ok) { const data = await res2.json(); ipLoc = `${data.region || ''} ${data.city || ''}`; }
                } catch(e2) {}
            }
            ipLoc = ipLoc.trim() || '隐秘星域';

            const d = new Date();
            const formattedTime = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;

            const newItem = {
                id: Date.now(), name: name, ip: ipLoc,
                time: formattedTime,
                text: text, img: currentCompressedImage
            };

            guestbookData.push(newItem);
            
            try {
                const encryptedDataStr = encryptData(guestbookData, PUBLIC_READ_KEY);
                const payloadStr = JSON.stringify({ encrypted: true, data: encryptedDataStr }, null, 2);

                const bodyData = { 
                    path: GUESTBOOK_FILE_PATH,
                    action: "submit", 
                    message: `New Memory from ${name}`, 
                    content: encodeBase64(payloadStr)
                };
                if (gbFileSha) bodyData.sha = gbFileSha;

                const res = await fetch(CF_WORKER_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData)
                });

                if (res.ok) {
                    const responseData = await res.json(); gbFileSha = responseData.content.sha;
                    document.getElementById('gb-text').value = ''; document.getElementById('gb-preview').style.display = 'none'; currentCompressedImage = null;
                    renderGuestbook(); showToast("✅ 胶囊封存成功");
                } else {
                    const errorMsg = await res.json(); alert("封存失败: " + errorMsg.message); guestbookData.pop(); 
                }
            } catch (err) { guestbookData.pop(); alert("网络波动，封存失败"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        // ==========================================
        // 配置修改保存逻辑
        // ==========================================
        function executeAction(id) {
            const cfg = currentConfig[id]; if (!cfg) return;
            if (cfg.type === 'tel') { copyText(cfg.value, '号码'); setTimeout(() => { window.location.href = 'tel:' + cfg.value; }, 600); } 
            else if (cfg.type === 'url') { window.location.href = cfg.value; } 
            else if (cfg.type === 'copy') { copyText(cfg.value, cfg.labelName); } 
            else if (cfg.type === 'email') { window.location.href = 'mailto:' + cfg.value; }
        }

        async function editAction(id) {
            if (!requireAuth()) return;
            const newVal = prompt(`修改 ${currentConfig[id].labelName}：\n当前数据：${currentConfig[id].value}\n\n新数据：`, currentConfig[id].value);
            if (newVal !== null && newVal.trim() !== '' && newVal !== currentConfig[id].value) {
                currentConfig[id].value = newVal.trim(); await syncToGitHub(CONFIG_FILE_PATH);
            }
        }

        function enableMemoEdit(container) {
            const textNode = container.querySelector('.card-text');
            if (textNode.getAttribute('contenteditable') === 'true') return;
            if (!requireAuth()) return;
            textNode.setAttribute('contenteditable', 'true'); container.classList.add('editing'); textNode.focus();
            showToast("🔓 进入编辑，空白处点击保存");
            
            textNode.addEventListener('blur', async function autoSave() {
                textNode.setAttribute('contenteditable', 'false'); container.classList.remove('editing');
                textNode.removeEventListener('blur', autoSave);
                if (currentConfig['memo-card'].value !== textNode.innerHTML) {
                    currentConfig['memo-card'].value = textNode.innerHTML; await syncToGitHub(CONFIG_FILE_PATH);
                }
            });
        }

        async function syncToGitHub(filePath) {
            document.getElementById('loader').style.display = 'block';
            try {
                const encryptedDataStr = encryptData(currentConfig, PUBLIC_READ_KEY);
                const payloadStr = JSON.stringify({ encrypted: true, data: encryptedDataStr }, null, 2);

                const bodyData = { 
                    path: filePath,
                    action: "update_config", 
                    message: `Update config from UI`, 
                    content: encodeBase64(payloadStr), 
                    password: currentAdminPassword
                };
                if (fileSha) bodyData.sha = fileSha;

                const res = await fetch(CF_WORKER_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData)
                });

                if (res.ok) { 
                    const responseData = await res.json(); fileSha = responseData.content.sha; renderUI(currentConfig); showToast("✅ 数据同步成功");
                } else { 
                    const errorMsg = await res.json(); alert("同步失败: " + errorMsg.message); 
                    if(res.status === 401) { isSessionUnlocked = false; currentAdminPassword = null; }
                }
            } catch (err) { alert("网络异常，无法同步"); } 
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function copyText(text, typeName) { if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(text).then(() => { showToast(`已复制 ${typeName}`); }).catch(() => fallbackCopyText(text, typeName)); } else { fallbackCopyText(text, typeName); } }
        function fallbackCopyText(text, typeName) { const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "fixed"; textArea.style.opacity = "0"; document.body.appendChild(textArea); textArea.focus(); textArea.select(); try { document.execCommand('copy'); showToast(`已复制 ${typeName}`); } catch (err) {} document.body.removeChild(textArea); }
        function showToast(message) { const toast = document.getElementById("toast"); toast.innerText = message; toast.className = "show"; setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2200); }

        const loveQuotes = ["“你的一颦一笑，是我在这人间见过的最美风景。”", "“我爱你，如鲸向海，如鸟投林，退无可退，避无可避。”", "“你是我平淡岁月里，最温柔的星辰。”", "“遇见你之后，世间所有的浪漫都有了具体的模样。”", "“这世界纵然喧嚣，我的眼底只偏爱你。”", "“想借你心头的月亮，照亮我半生的迷茫。”", "“我的世界因为你，才有了光怪陆离的色彩。”", "“在这漫长而又短暂的一生中，我想每天都对你说早安。”", "“你幕藏在微风里的欢喜，也是我跌入梦境的星河。”", "“我将永远忠于自己，披星戴月奔向你。”", "“人间烟火，山河远阔，无一是你，无一不是你。”", "“你什么都不用做，就赢得了我所有的温柔。”", "“风行过万里，月沉过海底，我遇见了这世上唯一契合的你。”", "“想把你写在风里，这样全世界都能读到我的爱意。”", "“只要看着你，我眼底的冰雪就能瞬间融化成春水。”", "“这世间美好的事物有太多，但能让我心动的，只有于你一个。”", "“我对你的爱，就像这不落的星辰，永恒且璀璨。”", "“你是我漫长黑夜里的灯塔，指引我走向黎明。”", "“我的灵魂中有一片荒芜，直到你来，它开满了鲜花。”", "“爱你是这浩瀚宇宙赋予我最神圣的宿命。”"];
        function initLoveQuote() { document.getElementById('love-quote').innerText = loveQuotes[Math.floor(Math.random() * loveQuotes.length)]; }
        function triggerNextQuote() { const quoteEl = document.getElementById('love-quote'); if (navigator.vibrate) navigator.vibrate([15]); quoteEl.classList.add('fade-out'); setTimeout(() => { quoteEl.innerText = loveQuotes[Math.floor(Math.random() * loveQuotes.length)]; quoteEl.classList.remove('fade-out'); }, 1500); }
    </script>
