<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>清禾后花园</title>
<style>
@font-face{font-family:'LXGW';src:url('font/lxgw.ttf') format('truetype');font-display:swap;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'LXGW','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(-45deg,#f3e7fb,#fde7f3,#e9e0fb,#fce4f0,#f0e6fc);background-size:400% 400%;animation:bgFlow 22s ease infinite;color:#5a4a6a;min-height:100vh;position:relative;}
@keyframes bgFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#stars,#blobs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.blob{position:absolute;border-radius:50%;filter:blur(48px);opacity:.5;mix-blend-mode:screen;animation:floatBlob 18s ease-in-out infinite;}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-50px) scale(1.15)}}
.wrap{position:relative;z-index:2;max-width:940px;margin:0 auto;padding:26px 16px 60px;}
.title{text-align:center;margin:14px 0 26px;font-family:'LXGW',serif;font-weight:700;letter-spacing:4px;line-height:1.1;position:relative;user-select:none;cursor:pointer;}
.title span{font-size:clamp(46px,11vw,86px);color:#c58bff;background:linear-gradient(100deg,#c58bff,#ff9ecf,#a98bff,#ffb0dd,#c58bff);background-size:300% auto;-webkit-background-clip:text;background-clip:text;animation:flow 6s linear infinite,breathe 4s ease-in-out infinite;filter:drop-shadow(0 0 14px rgba(197,139,255,.55));display:inline-block;position:relative;}
@supports((-webkit-background-clip:text) or (background-clip:text)){.title span{-webkit-text-fill-color:transparent;}}
.title .big{font-size:clamp(58px,14vw,110px);}
@keyframes flow{to{background-position:300% center}}
@keyframes breathe{0%,100%{filter:drop-shadow(0 0 12px rgba(197,139,255,.45)) brightness(1)}50%{filter:drop-shadow(0 0 26px rgba(255,158,207,.8)) brightness(1.12)}}
.timer{text-align:center;font-size:clamp(14px,3.6vw,18px);margin-bottom:24px;color:#8a6ca0;letter-spacing:1px;text-shadow:0 0 8px rgba(255,255,255,.6);animation:breathe 5s ease-in-out infinite;}
.timer b{color:#c26fd6;font-size:1.15em;padding:0 2px;}
.mega{border-radius:34px;padding:26px 20px 30px;position:relative;background:rgba(255,255,255,.28);backdrop-filter:blur(26px) saturate(160%);-webkit-backdrop-filter:blur(26px) saturate(160%);border:1px solid rgba(255,255,255,.5);box-shadow:0 20px 60px -20px rgba(180,120,220,.5),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -20px 40px -30px rgba(200,150,255,.4);overflow:hidden;}
.mega::before{content:'';position:absolute;top:-60%;left:-30%;width:80%;height:180%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.35),transparent);transform:rotate(8deg);animation:megaShine 9s ease-in-out infinite;pointer-events:none;}
@keyframes megaShine{0%,100%{left:-40%}50%{left:120%}}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px;}
.card{grid-column:span 1;position:relative;border-radius:22px;padding:18px 16px;min-height:78px;display:flex;align-items:center;gap:14px;cursor:pointer;overflow:hidden;background:rgba(255,255,255,.32);backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);border:1px solid rgba(255,255,255,.55);box-shadow:0 10px 26px -14px rgba(180,120,220,.55),inset 0 1px 0 rgba(255,255,255,.8);animation:floatCard 6s ease-in-out infinite,cardBreathe 5s ease-in-out infinite;transition:transform .5s cubic-bezier(.2,.8,.2,1.2),box-shadow .4s;will-change:transform;}
.card:nth-child(even){animation-delay:-2s,-1.5s;}
.card:nth-child(3n){animation-delay:-3.5s,-2.8s;}
@keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes cardBreathe{0%,100%{box-shadow:0 10px 26px -14px rgba(180,120,220,.5),inset 0 1px 0 rgba(255,255,255,.8)}50%{box-shadow:0 14px 34px -12px rgba(255,158,207,.65),inset 0 1px 0 rgba(255,255,255,.9),0 0 18px rgba(197,139,255,.35)}}
.card:hover{transform:translateY(-8px) scale(1.03);}
.card::after{content:'';position:absolute;top:0;left:-70%;width:50%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.6),transparent);transform:skewX(-18deg);transition:left .7s;pointer-events:none;}
.card:hover::after{left:130%;}
.card.full{grid-column:1 / -1;}
.card .ico{width:38px;height:38px;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(150,100,200,.3));}
.card .txt{display:flex;flex-direction:column;overflow:hidden;}
.card .txt .h{font-size:16px;font-weight:700;color:#6a4f80;}
.card .txt .s{font-size:12.5px;color:#a084b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.6);transform:scale(0);animation:rip .7s ease-out;pointer-events:none;}
@keyframes rip{to{transform:scale(4);opacity:0}}
.card.textcard{align-items:stretch;flex-direction:column;min-height:120px;}
.card.textcard textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:inherit;color:#4a3a5a;font-size:18px;line-height:1.7;text-align:center;}
.card.textcard textarea::placeholder{text-align:center;}
.capsule{margin-top:26px;border-radius:26px;padding:22px 18px;background:rgba(255,255,255,.26);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);border:1px solid rgba(255,255,255,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 12px 30px -18px rgba(180,120,220,.5);}
.capsule h2{display:flex;align-items:center;gap:10px;font-size:20px;color:#7a5a92;margin-bottom:16px;justify-content:center;}
.capsule input,.capsule textarea{width:100%;margin-bottom:10px;padding:11px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.4);outline:none;font-family:inherit;color:#6a4f80;font-size:14px;}
.capsule textarea{min-height:70px;resize:vertical;}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn{border:none;border-radius:14px;padding:11px 22px;cursor:pointer;font-family:inherit;font-weight:700;color:#fff;background:linear-gradient(100deg,#c58bff,#ff9ecf);box-shadow:0 6px 18px -6px rgba(197,139,255,.7);transition:transform .3s;}
.btn:active{transform:scale(.94);}
.btn.g{background:linear-gradient(100deg,#b0a0e8,#d0a0d8);}
.msgs{margin-top:16px;display:flex;flex-direction:column;gap:12px;}
.msg{border-radius:16px;padding:12px 14px;background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.55);}
.msg .top{display:flex;justify-content:space-between;font-size:12px;color:#a084b8;margin-bottom:5px;align-items:center;}
.msg .nm{font-weight:700;color:#7a5a92;}
.msg .body{color:#6a4f80;font-size:14px;line-height:1.6;word-break:break-word;}
.msg .body img,.msg .body video{max-width:100%;border-radius:10px;margin-top:6px;}
.delbtn{color:#e07a9a;cursor:pointer;margin-left:8px;font-weight:700;}
.delbtn:active{opacity:.6;}
.lovewords{margin-top:24px;border-radius:26px;padding:30px 24px 26px;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(255,224,242,.34),rgba(230,220,255,.34));backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);border:1px solid rgba(255,255,255,.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 14px 34px -18px rgba(200,140,230,.55);text-align:center;}
.lovewords::before{content:'';position:absolute;top:-50%;left:-30%;width:70%;height:200%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.4),transparent);transform:rotate(10deg);animation:megaShine 7s ease-in-out infinite;pointer-events:none;}
.lw-heart{width:30px;height:30px;margin:0 auto 12px;display:block;filter:drop-shadow(0 0 10px rgba(255,158,207,.7));animation:lwBeat 1.5s ease-in-out infinite;}
@keyframes lwBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.22)}30%{transform:scale(1)}45%{transform:scale(1.14)}}
.lw-stage{min-height:56px;display:flex;align-items:center;justify-content:center;perspective:600px;}
.lw-line{font-family:'LXGW','PingFang SC','Microsoft YaHei',serif;font-size:clamp(18px,4.6vw,25px);font-weight:700;letter-spacing:1.5px;line-height:1.5;color:#222;min-height:1.5em;}
.lw-in{animation:lwIn .9s cubic-bezier(.22,.9,.28,1.2) both;}
.lw-out{animation:lwOut .55s cubic-bezier(.5,0,.75,0) forwards;}
@keyframes lwIn{0%{opacity:0;transform:translateY(22px) rotateX(-55deg) scale(.85);filter:blur(8px)}60%{opacity:1;filter:blur(0)}100%{opacity:1;transform:translateY(0) rotateX(0) scale(1);filter:blur(0)}}
@keyframes lwOut{0%{opacity:1;transform:translateY(0) rotateX(0) scale(1);filter:blur(0)}100%{opacity:0;transform:translateY(-22px) rotateX(55deg) scale(.85);filter:blur(8px)}}
.lw-char{display:inline-block;animation:lwCharIn .6s cubic-bezier(.22,.9,.28,1.2) both;}
@keyframes lwCharIn{0%{opacity:0;transform:translateY(14px) scale(.6)}100%{opacity:1;transform:translateY(0) scale(1)}}
.lw-dots{display:flex;gap:7px;justify-content:center;margin-top:16px;}
.lw-dots span{width:6px;height:6px;border-radius:50%;background:rgba(197,139,255,.35);animation:lwDot 1.5s ease-in-out infinite;}
.lw-dots span:nth-child(2){animation-delay:.5s}
.lw-dots span:nth-child(3){animation-delay:1s}
@keyframes lwDot{0%,100%{transform:scale(1);background:rgba(197,139,255,.35)}50%{transform:scale(1.6);background:rgba(255,143,196,.9)}}
.modal{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;background:rgba(120,90,150,.28);backdrop-filter:blur(8px);}
.modal.on{display:flex;}
.box{width:min(420px,90vw);border-radius:24px;padding:24px;background:rgba(255,255,255,.7);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.7);box-shadow:0 24px 60px -20px rgba(180,120,220,.6);}
.box h3{color:#7a5a92;margin-bottom:14px;text-align:center;}
.box input,.box textarea{width:100%;margin-bottom:12px;padding:12px 14px;border-radius:14px;border:1px solid rgba(197,139,255,.4);background:rgba(255,255,255,.6);outline:none;font-family:inherit;color:#6a4f80;}
.box textarea{min-height:90px;resize:vertical;}
.box .row{justify-content:flex-end;}
.tiny{font-size:11px;color:#b09ac0;text-align:center;margin-top:6px;line-height:1.5;}
.toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);background:rgba(90,60,120,.9);color:#fff;padding:10px 22px;border-radius:20px;z-index:200;opacity:0;transition:.35s;font-size:14px;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.adminbar{position:fixed;top:14px;right:14px;z-index:50;display:none;align-items:center;gap:8px;background:rgba(197,139,255,.85);color:#fff;padding:7px 14px;border-radius:20px;font-size:13px;box-shadow:0 6px 18px -6px rgba(197,139,255,.7);}
.adminbar.on{display:flex;}
.adminbar button{border:none;background:rgba(255,255,255,.3);color:#fff;border-radius:12px;padding:4px 10px;cursor:pointer;font-family:inherit;}
@media(max-width:560px){.card .txt .s{max-width:48vw}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="blobs"></div>
<div class="adminbar" id="adminbar">🔓 管理模式 <button onclick="logoutAdmin()">退出</button></div>

<div class="wrap">

  <div class="mega" id="mega">

    <div class="capsule">
      <h2><svg class="ico" style="width:24px;height:24px" viewBox="0 0 24 24" fill="none"><path d="M12 2a9 9 0 0 0-9 9v6a3 3 0 0 0 3 3h1l2 2 2-2h1a9 9 0 0 0 0-18Z" stroke="#c58bff" stroke-width="1.6"/><circle cx="12" cy="10" r="2.4" fill="#ff9ecf"/></svg>时光胶囊</h2>
      <input id="capNick" placeholder="昵称">

      <div class="lw-stage"><div class="lw-line" id="lwLine">遇见你之后，日子都染上了甜味。</div></div>
      <div class="lw-dots"><span></span><span></span><span></span></div>

  </div>
</div>

<div class="modal" id="adminModal"><div class="box">
  <h3>管理员登录</h3>
  <input id="admPass" type="password" placeholder="管理密码">

</div></div>

<div class="modal" id="editModal"><div class="box">
  <h3>编辑卡片</h3>
  <input id="editVal" placeholder="内容">
  <div class="row"><button class="btn g" onclick="closeEdit()">取消</button><button class="btn" onclick="saveEdit()">保存</button></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
/* ====== 配置 ====== */
const WORKER_URL="https://proud-river-c46c.zkaydhl.workers.dev";
const ADMIN_PASS="@1264&9621^ZhBingBing*#55134.";
const GH_USER="zkaydhl", GH_REPO="zkaydhl.github.io";
const PSKEY="@1264&9621^ZhBingBing*#55134.";
const RAW=p=>`https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${p}?t=`+Date.now();

/* ====== 加密 ====== */
async function aesKey(){const enc=new TextEncoder();const km=await crypto.subtle.importKey('raw',enc.encode(PSKEY),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('qinghe.salt'),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encrypt(obj){const key=await aesKey();const iv=crypto.getRandomValues(new Uint8Array(12));const data=new TextEncoder().encode(JSON.stringify(obj));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,data);const buf=new Uint8Array(iv.length+ct.byteLength);buf.set(iv);buf.set(new Uint8Array(ct),iv.length);return btoa(String.fromCharCode(...buf));}
async function decrypt(b64){try{const key=await aesKey();const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const iv=raw.slice(0,12),ct=raw.slice(12);const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);return JSON.parse(new TextDecoder().decode(pt));}catch(e){return null;}}

/* ====== 管理态 ====== */
let ADMIN=!!localStorage.getItem('qh_token');
function getToken(){return localStorage.getItem('qh_token');}

/* ====== 公开读取 ====== */
async function readPublic(path){
  try{
    const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(RAW(path),{signal:ctrl.signal});clearTimeout(to);
    if(!r.ok)return null;
    const t=await r.text();const m=t.match(/=\s*("[\s\S]*")\s*;?\s*$/);
    if(!m)return null;return await decrypt(JSON.parse(m[1]));
  }catch(e){return null;}
}
async function ghPut(path,text,msg){
  const tk=getToken();if(!tk)return false;
  const api=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`;
  const h={'Authorization':'token '+tk,'Accept':'application/vnd.github+json'};
  let sha=null;const g=await fetch(api,{headers:h});if(g.ok){sha=(await g.json()).sha;}
  const body={message:msg||('update '+path),content:btoa(unescape(encodeURIComponent(text)))};if(sha)body.sha=sha;
  const r=await fetch(api,{method:'PUT',headers:h,body:JSON.stringify(body)});return r.ok;
}
async function saveEncFile(path,varName,obj){const enc=await encrypt(obj);return ghPut(path,`window.${varName}=${JSON.stringify(enc)};`,'sync '+path);}

/* ====== 图标 ====== */
const ICONS={
gv:`<svg class="ico" viewBox="0 0 48 48"><path fill="#00a854" d="M24 4 6 12v10c0 11 8 18 18 22 10-4 18-11 18-22V12L24 4z"/><path fill="#fff" d="m22 18 8 6-8 6v-4h-8v-4h8v-4z"/></svg>`,
tg:`<svg class="ico" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#2aabee"/><path fill="#fff" d="M11 23.5 33 15c1-.4 1.9.2 1.6 1.7l-3.7 17.4c-.3 1.3-1.1 1.6-2.2.99l-6.1-4.5-2.9 2.8c-.3.3-.6.6-1.2.6l.4-6.2 11.3-10.2c.5-.4-.1-.6-.7-.2L15.6 25l-6-1.9c-1.3-.4-1.3-1.3.4-1.6z"/></svg>`,
sig:`<svg class="ico" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#3a76f0"/><path fill="#fff" d="M24 11c-7.2 0-13 5.2-13 11.6 0 3 1.3 5.7 3.4 7.8L13 37l6.2-1.6c1.5.5 3.1.8 4.8.8 7.2 0 13-5.2 13-11.6S31.2 11 24 11z"/></svg>`,
wc:`<svg class="ico" viewBox="0 0 48 48"><path fill="#2dc100" d="M19 8C10.7 8 4 13.7 4 20.8c0 3.9 2.1 7.4 5.4 9.7L8 35l5.3-2.7c1.8.5 3.7.8 5.7.8h1.3c-.5-1.4-.8-2.9-.8-4.4 0-7 6.6-12.6 14.8-12.6h1C33.7 11.6 26.9 8 19 8z"/><circle cx="14" cy="18" r="2" fill="#fff"/><circle cx="24" cy="18" r="2" fill="#fff"/><path fill="#2dc100" d="M44 28.5C44 22.7 38.4 18 31.5 18S19 22.7 19 28.5 24.6 39 31.5 39c1.5 0 3-.2 4.3-.6L40 40l-1.1-3.4c3.1-1.9 5.1-4.8 5.1-8.1z"/><circle cx="27" cy="27" r="1.8" fill="#fff"/><circle cx="36" cy="27" r="1.8" fill="#fff"/></svg>`,
qq:`<svg class="ico" viewBox="0 0 48 48"><path fill="#12b7f5" d="M24 5c-7 0-12 5-12 13 0 2-2 4-3 7s-2 6 0 7c1 .5 3-1 4-3 1 3 4 5 5 5-1 1-3 2-3 4 0 3 5 4 9 4s9-1 9-4c0-2-2-3-3-4 1 0 4-2 5-5 1 2 3 3.5 4 3 2-1 1-4 0-7s-3-5-3-7c0-8-5-13-12-13z"/><ellipse cx="19" cy="17" rx="1.6" ry="2.2" fill="#fff"/><ellipse cx="29" cy="17" rx="1.6" ry="2.2" fill="#fff"/></svg>`,
gm:`<svg class="ico" viewBox="0 0 48 48"><path fill="#fff" d="M8 12h32v24H8z"/><path fill="#ea4335" d="M8 14v4l16 11L40 18v-4l-16 11z"/><path fill="#fbbc05" d="M4 14v22h6V18z"/><path fill="#34a853" d="M44 14v22h-6V18z"/><path fill="#c5221f" d="M4 14l4-2 16 11 16-11 4 2v4L24 29 4 18z"/></svg>`,
rocket:`<svg class="ico" viewBox="0 0 48 48"><path fill="#c58bff" d="M24 4c8 4 12 12 12 22l-4 6H16l-4-6C12 16 16 8 24 4z"/><circle cx="24" cy="18" r="4" fill="#fff"/><path fill="#ff9ecf" d="M16 34l-4 8 8-4zM32 34l4 8-8-4z"/></svg>`,
eth:`<svg class="ico" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#627eea"/><path fill="#fff" fill-opacity=".8" d="M24 8v11.8l10 4.5z"/><path fill="#fff" d="M24 8 14 24.3l10-4.5z"/><path fill="#fff" fill-opacity=".8" d="M24 31.2V40l10-13.9z"/><path fill="#fff" d="M24 40v-8.8l-10-6.9z"/><path fill="#fff" fill-opacity=".4" d="m24 29.3 10-5.5-10-4.5z"/><path fill="#fff" fill-opacity=".7" d="m14 23.8 10 5.5V19.3z"/></svg>`,
trx:`<svg class="ico" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#ef0027"/><path fill="#fff" d="M13 15l22 4-11 18zM16 18l6 12 2-9zm10 2 5-1-7 12z"/></svg>`,
text:`<svg class="ico" viewBox="0 0 48 48"><rect x="8" y="8" width="32" height="32" rx="6" fill="#c58bff" opacity=".6"/><path d="M15 18h18M15 24h18M15 30h12" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>`

let curEdit=null;
function bindCard(div,m,click){
  let timer,moved=false,longPressed=false;
  const start=()=>{longPressed=false;moved=false;if(ADMIN)timer=setTimeout(()=>{longPressed=true;openEdit(m);},650);};
  const end=()=>{clearTimeout(timer);if(!longPressed&&!moved)click();};
  div.addEventListener('mousedown',start);div.addEventListener('mouseup',end);div.addEventListener('mouseleave',()=>clearTimeout(timer));
  div.addEventListener('touchstart',(e)=>{start();ripple(e,div);},{passive:true});
  div.addEventListener('touchmove',()=>{moved=true;clearTimeout(timer);});
  div.addEventListener('touchend',end);
  div.addEventListener('mousedown',(e)=>ripple(e,div));
}
function openEdit(m){curEdit=m;document.getElementById('editVal').value=DATA[m.id]??DEFAULTS[m.id];document.getElementById('editModal').classList.add('on');}
function closeEdit(){document.getElementById('editModal').classList.remove('on');}
async function saveEdit(){if(!curEdit)return;DATA[curEdit.id]=document.getElementById('editVal').value;closeEdit();render();const ok=await saveEncFile('data.js','__data',DATA);toast(ok?'已同步':'保存失败');}

function ripple(e,el){const r=document.createElement('span');r.className='ripple';const rect=el.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;const s=Math.max(rect.width,rect.height);r.style.width=r.style.height=s+'px';r.style.left=(x-s/2)+'px';r.style.top=(y-s/2)+'px';el.appendChild(r);setTimeout(()=>r.remove(),700);}
let tt;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),1800);}

const START=new Date(2018,4,9,0,0,0);
function tick(){const now=new Date();let y=now.getFullYear()-START.getFullYear();let mo=now.getMonth()-START.getMonth();let d=now.getDate()-START.getDate();if(d<0){mo--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}if(mo<0){y--;mo+=12;}document.getElementById('timer').innerHTML=`已相守 <b>${y}</b> 年 <b>${mo}</b> 月 <b>${d}</b> 天 <b>${now.getHours()}</b> 小时 <b>${now.getMinutes()}</b> 分钟 <b>${now.getSeconds()}</b> 秒`;}

const cv=document.getElementById('stars'),ctx=cv.getContext('2d');let sw,sh,ps=[];
function initStars(){sw=cv.width=innerWidth;sh=cv.height=innerHeight;ps=[];for(let i=0;i<90;i++)ps.push({x:Math.random()*sw,y:Math.random()*sh,r:Math.random()*1.6+.3,a:Math.random(),v:Math.random()*.4+.1});}
function drawStars(){ctx.clearRect(0,0,sw,sh);ps.forEach(p=>{p.a+=0.02;p.y-=p.v;if(p.y<0)p.y=sh;const o=.4+Math.abs(Math.sin(p.a))*.6;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fillStyle=`rgba(200,160,255,${o})`;ctx.fill();});requestAnimationFrame(drawStars);}
addEventListener('resize',initStars);initStars();drawStars();

let MSGS=[];
async function loadMsgs(){
  try{
    const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(WORKER_URL,{method:'GET',signal:ctrl.signal});clearTimeout(to);
    const j=await r.json();
    if(j.content){const m=j.content.match(/=\s*("[\s\S]*")\s*;?\s*$/);if(m){const dec=await decrypt(JSON.parse(m[1]));if(Array.isArray(dec))MSGS=dec;}}
  }catch(e){console.warn('留言加载失败',e);}
  renderMsgs();
}
function renderMsgs(){
  const box=document.getElementById('msgs');box.innerHTML='';
  MSGS.map((m,i)=>({m,i})).reverse().forEach(({m,i})=>{
    const div=document.createElement('div');div.className='msg';
    const delBtn=ADMIN?`<span class="delbtn" onclick="delMsg(${i})">✕ 删除</span>`:'';
    div.innerHTML=`<div class="top"><span class="nm">${esc(m.nick)}</span><span>${m.ip||''} · ${m.time} ${delBtn}</span></div><div class="body">${ubb(m.text)}</div>`;
    box.appendChild(div);
  });
}
function esc(s){return(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function ubb(s){return esc(s).replace(/\[img\](.*?)\[\/img\]/g,'<img src="$1">').replace(/\[video\](.*?)\[\/video\]/g,'<video src="$1" controls></video>').replace(/\n/g,'<br>');}
document.getElementById('capImg').addEventListener('change',function(){const f=this.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,max=1080;if(w>max||h>max){if(w>h){h=h*max/w;w=max;}else{w=w*max/h;h=max;}}const cn=document.createElement('canvas');cn.width=w;cn.height=h;cn.getContext('2d').drawImage(img,0,0,w,h);const b64=cn.toDataURL('image/jpeg',.82);document.getElementById('capText').value+=`\n[img]${b64}[/img]`;toast('图片已添加');};img.src=e.target.result;};rd.readAsDataURL(f);});
async function getIP(){try{const r=await fetch('https://ipapi.co/json/');const j=await r.json();return `${j.country_name||''} ${j.region||''} ${j.city||''}`.trim();}catch(e){return '';}}
async function postMsg(){
  const nick=document.getElementById('capNick').value.trim()||'匿名';
  const text=document.getElementById('capText').value.trim();
  if(!text){toast('写点什么吧');return;}
  toast('投递中…');const ip=await getIP();
  MSGS.push({nick,text,ip,time:new Date().toLocaleString('zh-CN')});
  const enc=await encrypt(MSGS);
  try{const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({encData:enc})});const j=await r.json();document.getElementById('capText').value='';renderMsgs();toast(j.ok?'已投递':'投递失败');}
  catch(e){toast('网络错误');}
}
async function delMsg(i){
  if(!ADMIN)return;
  if(!confirm('确定删除这条留言？'))return;
  toast('删除中…');
  MSGS.splice(i,1);
  const enc=await encrypt(MSGS);
  try{const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({encData:enc})});const j=await r.json();renderMsgs();toast(j.ok?'已删除':'删除失败');}
  catch(e){toast('网络错误');}
}

let lwIdx=0,lwTimer=null;
function splitCharSpans(t){return t.split('').map((ch,i)=>`<span class="lw-char" style="animation-delay:${i*0.035}s">${ch===' '?'&nbsp;':ch}</span>`).join('');}
function showLove(){const line=document.getElementById('lwLine');if(!line)return;line.classList.remove('lw-out');line.innerHTML=splitCharSpans(LOVE_WORDS[lwIdx]);line.classList.remove('lw-in');void line.offsetWidth;line.classList.add('lw-in');}
function nextLove(){const line=document.getElementById('lwLine');if(!line)return;line.classList.remove('lw-in');line.classList.add('lw-out');setTimeout(()=>{lwIdx=(lwIdx+1)%LOVE_WORDS.length;showLove();},550);}
function startLove(){const line=document.getElementById('lwLine');if(!line){setTimeout(startLove,300);return;}lwIdx=0;showLove();if(lwTimer)clearInterval(lwTimer);lwTimer=setInterval(nextLove,2000);}

/* ====== 连点标题5次进管理 ====== */
let tapCount=0,tapTimer;
document.getElementById('title').addEventListener('click',()=>{
  if(ADMIN)return;
  tapCount++;clearTimeout(tapTimer);tapTimer=setTimeout(()=>tapCount=0,1200);
  if(tapCount>=5){tapCount=0;document.getElementById('adminModal').classList.add('on');}
});
function closeAdmin(){document.getElementById('adminModal').classList.remove('on');}
function loginAdmin(){
  const p=document.getElementById('admPass').value;
  const tk=document.getElementById('admToken').value.trim();
  if(p!==ADMIN_PASS){toast('密码错误');return;}
  if(!tk){toast('请输入 Token');return;}
  localStorage.setItem('qh_token',tk);location.reload();
}
function logoutAdmin(){localStorage.removeItem('qh_token');location.reload();}

/* ====== 初始化 ====== */
async function boot(){
  if(ADMIN)document.getElementById('adminbar').classList.add('on');
  startLove();
  const d=await readPublic('data.js');if(d)DATA=Object.assign({},DEFAULTS,d);
  const t=await readPublic('sj.js');if(t&&t.text)TEXTCARD=t.text;
  render();
  loadMsgs();
}
boot();
</script>
